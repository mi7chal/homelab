---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: homelab
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
      - name: plex
        image: lscr.io/linuxserver/plex:latest
        env:
        - name: VERSION
          valueFrom:
            configMapKeyRef:
              name: plex-config
              key: VERSION
        - name: PUID
          valueFrom:
            configMapKeyRef:
              name: plex-config
              key: PUID
        - name: PGID
          valueFrom:
            configMapKeyRef:
              name: plex-config
              key: PGID
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: plex-config
              key: TZ
        - name: PLEX_CLAIM
          valueFrom:
            secretKeyRef:
              name: plex-secrets
              key: PLEX_CLAIM
        ports:
        - containerPort: 32400
          name: plex
        - containerPort: 1900
          name: dlna-udp
          protocol: UDP
        - containerPort: 8324
          name: roku
        - containerPort: 32410
          name: gdm-32410
          protocol: UDP
        - containerPort: 32412
          name: gdm-32412
          protocol: UDP
        - containerPort: 32413
          name: gdm-32413
          protocol: UDP
        - containerPort: 32414
          name: gdm-32414
          protocol: UDP
        - containerPort: 32469
          name: dlna-tcp
        volumeMounts:
        - name: plex-config
          mountPath: /config
        - name: media
          mountPath: /data
          readOnly: true
        - name: dev-dri
          mountPath: /dev/dri
        securityContext:
          privileged: true
      volumes:
      - name: plex-config
        persistentVolumeClaim:
          claimName: plex-config
      - name: media
        hostPath:
          path: /mnt/media
          type: Directory
      - name: dev-dri
        hostPath:
          path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: homelab
spec:
  selector:
    app: plex
  ports:
  - name: plex
    port: 32400
    targetPort: 32400
    protocol: TCP
  - name: dlna-udp
    port: 1900
    targetPort: 1900
    protocol: UDP
  - name: roku
    port: 8324
    targetPort: 8324
    protocol: TCP
  - name: gdm-32410
    port: 32410
    targetPort: 32410
    protocol: UDP
  - name: gdm-32412
    port: 32412
    targetPort: 32412
    protocol: UDP
  - name: gdm-32413
    port: 32413
    targetPort: 32413
    protocol: UDP
  - name: gdm-32414
    port: 32414
    targetPort: 32414
    protocol: UDP
  - name: dlna-tcp
    port: 32469
    targetPort: 32469
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plex-ingress
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: plex.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: plex
            port:
              number: 32400
