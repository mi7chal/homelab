---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/metrics-server/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 24h
  chart:
    spec:
      chart: metrics-server
      version: "3.12.x"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  targetNamespace: kube-system
  install:
    createNamespace: true
  values:
    nodeSelector:
      hardware.home/tier: performance
    args:
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 250m
        memory: 400Mi
    livenessProbe:
      failureThreshold: 5
      timeoutSeconds: 5
    readinessProbe:
      failureThreshold: 5
      timeoutSeconds: 5
