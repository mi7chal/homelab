---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 24h
  chart:
    spec:
      chart: traefik
      version: "38.x.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  targetNamespace: traefik-system
  install:
    createNamespace: true
  values:
    ingressRoute:
      dashboard:
        enabled: true
        middlewares:
          - name: authentik
            namespace: traefik-system
        matchRule: Host(`traefik.example.com`)
        entryPoints: ["websecure"]
    fullnameOverride: traefik
    global:
      sendAnonymousUsage: false
    resources:
      requests:
        cpu: "100m"
        memory: "200Mi"
      limits:
        cpu: "1000m"
        memory: "500Mi"
    readinessProbe:
      failureThreshold: 5
      timeoutSeconds: 5
      initialDelaySeconds: 10
    livenessProbe:
      failureThreshold: 5
      timeoutSeconds: 5
      initialDelaySeconds: 10
    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: "10.0.0.3" # Need to be in metallb pool
      annotations:
        metallb.universe.tf/address-pool: home-pool
    ports:
      web:
        port: 8000
        expose:
          default: true
        exposedPort: 80
        protocol: TCP
        redirections:
          entryPoint:
            to: websecure
            scheme: https
      websecure:
        port: 8443
        expose:
          default: true
        exposedPort: 443
        protocol: TCP
        tls:
          enabled: true
    tlsStore:
      default:
        defaultCertificate:
          secretName: wildcard-emoh-pl-tls
    providers:
      kubernetesCRD:
        allowCrossNamespace: true # Allow Traefik to watch all namespaces
      kubernetesIngress:
        publishedService:
          enabled: true
