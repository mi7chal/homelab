kind: IngressRoute
metadata:
  name: rustfs-s3
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    # Path-style access and virtual host-style access
    - match: Host(`s3.rustfs.example.com`) || HostRegexp(`^[a-z0-9-]+\.s3\.rustfs\.emoh\.pl$`)
      kind: Rule
      services:
        - name: rustfs-s3-external
          port: 9000
---
apiVersion: v1
