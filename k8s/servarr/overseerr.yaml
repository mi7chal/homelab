---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overseerr
  namespace: homelab
  labels:
    app: overseerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overseerr
  template:
    metadata:
      labels:
        app: overseerr
    spec:
      containers:
      - name: overseerr
        image: lscr.io/linuxserver/overseerr:latest
        env:
        - name: PUID
          valueFrom:
            configMapKeyRef:
              name: servarr-config
              key: PUID
        - name: PGID
          valueFrom:
            configMapKeyRef:
              name: servarr-config
              key: PGID
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: servarr-config
              key: TZ
        ports:
        - containerPort: 5055
          name: http
        volumeMounts:
        - name: overseerr-config
          mountPath: /config
        - name: localtime
          mountPath: /etc/localtime
          readOnly: true
      volumes:
      - name: overseerr-config
        persistentVolumeClaim:
          claimName: overseerr-config
      - name: localtime
        hostPath:
          path: /etc/localtime
          type: File
---
apiVersion: v1
kind: Service
metadata:
  name: overseerr
  namespace: homelab
spec:
  selector:
    app: overseerr
  ports:
  - port: 5055
    targetPort: 5055
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overseerr-ingress
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: overseerr.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: overseerr
            port:
              number: 5055
