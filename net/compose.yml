services:
  adguardhome:
    image: adguard/adguardhome
    network_mode: host
    volumes:
      - /opt/docker/adguard/work:/opt/adguardhome/work
      - /opt/docker/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ}
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /opt/docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - /opt/docker/caddy/data:/data
      - /opt/docker/caddy/config:/config
    environment:
      - TZ=${TZ}
    networks:
      - cloudnet
      - servarr_net
      - plex_net
      - jellyfin_net
      - tdarr_net
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  tailscale:
    image: tailscale/tailscale:latest
    hostname: home_server
    network_mode: host
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_ROUTES: ${TAILSCALE_ROUTES}
      TS_USERSPACE: false
      TS_EXTRA_ARGS: --snat-subnet-routes=true --accept-dns=false
      TZ: ${TZ}
    volumes:
      - /opt/docker/tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
      TZ: ${TZ}
    networks:
      - cloudnet
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped

networks:
  cloudnet:
    driver: overlay
    attachable: true
  servarr_net:
    external: true
  plex_net:
    external: true
  jellyfin_net:
    external: true
  tdarr_net:
    external: true
