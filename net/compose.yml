services:
  adguardhome:
    image: adguard/adguardhome
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 67
        published: 67
        protocol: udp
        mode: host
      - target: 68
        published: 68
        protocol: tcp
        mode: host
      - target: 80
        published: 3000
        protocol: tcp
        mode: host
      - target: 443
        published: 3443
        protocol: tcp
        mode: host
      - target: 853
        published: 853
        protocol: tcp
        mode: host
      - target: 3000
        published: 3001
        protocol: tcp
        mode: host
    volumes:
      - /opt/docker/adguard/work:/opt/adguardhome/work
      - /opt/docker/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ}
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    environment:
      TZ: ${TZ}
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - /opt/docker/nginx-proxy-manager/data:/data
      - /opt/docker/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
    networks:
      - cloudnet
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  tailscale:
    image: tailscale/tailscale:latest
    hostname: home_server
    ports:
      - target: 41641
        published: 41641
        protocol: udp
        mode: host
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_ROUTES: ${TAILSCALE_ROUTES}
      TS_USERSPACE: false
      TS_EXTRA_ARGS: --snat-subnet-routes=true --accept-dns=false
      TZ: ${TZ}
    volumes:
      - /opt/docker/tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
      TZ: ${TZ}
    networks:
      - cloudnet
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager

networks:
  cloudnet:
    driver: overlay
    attachable: true
